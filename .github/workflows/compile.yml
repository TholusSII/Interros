name: Compile LaTeX

on:
  push:
    paths:
      - 'interros/**'
      - 'framework/**'
      - '.github/workflows/compile.yml'
      - 'latexmkrc'
      - 'Makefile'
  pull_request:
    paths:
      - 'interros/**'
      - 'framework/**'
      - '.github/workflows/compile.yml'
      - 'latexmkrc'
      - 'Makefile'
  workflow_dispatch:

jobs:
  compile:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: I01 Analyse fonctionnelle
            directory: interros/I01_AnalyseFonctionnelle
            file: I01_AnalyseFonctionnelle.tex
          - name: I02 Liaisons
            directory: interros/I02_Liaisons
            file: I02_Liaisons.tex
          - name: I03 Modélisation cinématique
            directory: interros/I03_ModelisationCinematique
            file: I03_ModelisationCinematique.tex
          - name: I04 Liaisons équivalentes
            directory: interros/I04_LiaisonsEquivalentes
            file: I04_LiaisonsEquivalentes.tex

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Restaurer les packages du framework
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode framework/vendor/rpcinematik.sty.gz.b64 | gzip --decompress > framework/rpcinematik.sty
          base64 --decode framework/vendor/rp-sysml.sty.gz.b64 | gzip --decompress > framework/rp-sysml.sty
          test -s framework/rpcinematik.sty
          test -s framework/rp-sysml.sty

      - name: Compiler ${{ matrix.name }}
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ${{ matrix.file }}
          working_directory: ${{ matrix.directory }}
          compiler: latexmk
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Déposer le PDF et le journal
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}-resultat
          path: |
            ${{ matrix.directory }}/*.pdf
            ${{ matrix.directory }}/*.log
          if-no-files-found: warn
          retention-days: 90
