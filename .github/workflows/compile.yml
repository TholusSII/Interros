name: Compile LaTeX

on:
  push:
    paths:
      - 'interros/**'
      - 'framework/**'
      - '.github/workflows/compile.yml'
      - 'latexmkrc'
      - 'Makefile'
  pull_request:
    paths:
      - 'interros/**'
      - 'framework/**'
      - '.github/workflows/compile.yml'
      - 'latexmkrc'
      - 'Makefile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Compiler toutes les interros avec LuaLaTeX
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts logs
          mapfile -d '' TEXFILES < <(find interros -type f -name '*.tex' -print0 | sort -z)
          if [ "${#TEXFILES[@]}" -eq 0 ]; then
            echo "Aucun fichier .tex trouvé dans interros/."
            exit 1
          fi

          failures=0
          for texfile in "${TEXFILES[@]}"; do
            directory="$(dirname "$texfile")"
            filename="$(basename "$texfile")"
            basename="${filename%.tex}"
            logfile="$PWD/logs/${basename}.log"

            echo "::group::Compilation de $texfile"
            docker run --rm \
              -v "$PWD:/work" \
              -w "/work/$directory" \
              ghcr.io/xu-cheng/texlive-full:latest \
              latexmk -lualatex -interaction=nonstopmode -halt-on-error -file-line-error "$filename" \
              2>&1 | tee "$logfile"
            status=${PIPESTATUS[0]}
            echo "::endgroup::"

            if [ "$status" -eq 0 ] && [ -f "$directory/$basename.pdf" ]; then
              cp "$directory/$basename.pdf" "artifacts/$basename.pdf"
              echo "PDF créé : $basename.pdf"
            else
              echo "::error file=$texfile::Échec de compilation de $texfile. Consulter logs/${basename}.log."
              failures=$((failures + 1))
            fi
          done

          echo "PDF disponibles :"
          find artifacts -maxdepth 1 -type f -name '*.pdf' -print || true
          if [ "$failures" -ne 0 ]; then
            echo "$failures compilation(s) ont échoué."
            exit 1
          fi

      - name: Déposer les PDF et journaux
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interros-pdf-et-logs
          path: |
            artifacts/*.pdf
            logs/*.log
          if-no-files-found: warn
          retention-days: 90
