name: Compile LaTeX

on:
  push:
    paths:
      - 'interros/**'
      - 'framework/**'
      - '.github/workflows/compile.yml'
      - 'latexmkrc'
      - 'Makefile'
  pull_request:
    paths:
      - 'interros/**'
      - 'framework/**'
      - '.github/workflows/compile.yml'
      - 'latexmkrc'
      - 'Makefile'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: I01 Analyse fonctionnelle
            directory: interros/I01_AnalyseFonctionnelle
            file: I01_AnalyseFonctionnelle.tex
          - name: I02 Liaisons
            directory: interros/I02_Liaisons
            file: I02_Liaisons.tex
          - name: I03 Modélisation des mécanismes
            directory: interros/I03_Liaisons
            file: I03_Liaisons.tex
          - name: I04 Liaisons équivalentes
            directory: interros/I04_LiaisonsEquivalentes
            file: I04_LiaisonsEquivalentes.tex
          - name: I05 Torseurs
            directory: interros/I05_Torseurs
            file: I05_Torseurs.tex
          - name: I06 Loi entrée-sortie
            directory: interros/I06_LoiEntreeSortie
            file: I06_LoiEntreeSortie.tex
          - name: I07 Engrenages
            directory: interros/I07_Engrenages
            file: I07_Engrenages.tex
          - name: I08 Cinématique du solide
            directory: interros/I08_Cinematique
            file: I08_Cinematique.tex
          - name: I08 Loi entrée-sortie
            directory: interros/I08_LoiEntreeSortie
            file: I08_LoiEntreeSortie.tex
          - name: I10 Théorie des mécanismes
            directory: interros/I10_TheorieMecanismes
            file: I10_TheorieMecanismes.tex
          - name: I11 Électrocinétique
            directory: interros/I11_Electrocinetique
            file: I11_Electrocinetique.tex
          - name: I12 Filtrage
            directory: interros/I12_Filtrage
            file: I12_Filtrage.tex
          - name: I14 Introduction aux systèmes asservis
            directory: interros/I14_IntroductionSA
            file: I14_IntroductionSA.tex
          - name: I15 Modélisation des systèmes asservis
            directory: interros/I15_ModelisationSA
            file: I15_ModelisationSA.tex
          - name: I16 Modélisation des systèmes asservis
            directory: interros/I16_Modelisation
            file: I16_Modelisation.tex
          - name: IB01 Analyse fonctionnelle
            directory: interros/IB01_AnalyseFonctionnelle
            file: IB01_AnalyseFonctionnelle.tex
          - name: IB02 Liaisons
            directory: interros/IB02_Liaisons
            file: IB02_Liaisons.tex
          - name: IB03 Outils mathématiques
            directory: interros/IB03_OutilsMathematiques
            file: IB03_OutilsMathematiques.tex
          - name: IB04 Loi entrée-sortie
            directory: interros/IB04_LoiEntreeSortie
            file: IB04_LoiEntreeSortie.tex

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer TeX Live
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            lmodern \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-pictures \
            texlive-science \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-french
          kpsewhich lmodern.sty
          kpsewhich esvect.sty

      - name: Restaurer les packages du framework
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode framework/vendor/rpcinematik.sty.gz.b64 | gzip --decompress > framework/rpcinematik.sty
          base64 --decode framework/vendor/rp-sysml.sty.gz.b64 | gzip --decompress > framework/rp-sysml.sty
          test -s framework/rpcinematik.sty
          test -s framework/rp-sysml.sty
          ls -l framework/rpcinematik.sty framework/rp-sysml.sty

      - name: Vérifier les fichiers attendus
        shell: bash
        run: |
          set -euo pipefail
          test -d '${{ matrix.directory }}'
          test -f '${{ matrix.directory }}/${{ matrix.file }}'
          test -f framework/interros-framework.tex
          test -f framework/kholles-framework.tex
          test -f framework/si-bibliotheques.tex

      - name: Compiler ${{ matrix.name }}
        shell: bash
        run: |
          set -o pipefail
          cd '${{ matrix.directory }}'
          latexmk -C '${{ matrix.file }}' || true
          latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error '${{ matrix.file }}' 2>&1 | tee compilation-ci.log

      - name: Préparer le PDF pour publication
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "publication/${{ matrix.directory }}"
          cp "${{ matrix.directory }}/${{ matrix.file%.tex }}.pdf" "publication/${{ matrix.directory }}/"

      - name: Afficher les erreurs LaTeX
        if: failure()
        shell: bash
        run: |
          echo '===== Premières erreurs détectées ====='
          grep -nE '^!|LaTeX Error|Package .* Error|Undefined control sequence|Emergency stop|Fatal error|not found' '${{ matrix.directory }}/compilation-ci.log' | head -80 || true
          echo '===== Fin du journal ====='
          tail -120 '${{ matrix.directory }}/compilation-ci.log' || true

      - name: Déposer le PDF et les journaux
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}-resultat
          path: |
            publication/**
            ${{ matrix.directory }}/*.pdf
            ${{ matrix.directory }}/*.log
          if-no-files-found: warn
          retention-days: 90

  publier-pdf:
    name: Publier les PDF dans le dépôt
    if: github.event_name == 'push'
    needs: compile
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Télécharger les PDF compilés
        uses: actions/download-artifact@v4
        with:
          pattern: '*-resultat'
          path: resultats
          merge-multiple: true

      - name: Copier les PDF dans les dossiers des interros
        shell: bash
        run: |
          set -euo pipefail
          test -d resultats/publication/interros
          cp -R resultats/publication/interros/. interros/
          find interros -name '*.pdf' -type f -print

      - name: Committer et pousser les PDF
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add interros

          if git diff --cached --quiet; then
            echo 'Les PDF sont déjà à jour.'
            exit 0
          fi

          git commit -m 'Mettre à jour automatiquement les PDF des interros'
          git push
