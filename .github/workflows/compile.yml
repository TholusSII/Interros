name: Compile LaTeX

on:
  push:
    paths:
      - 'interros/**'
      - 'framework/**'
      - '.github/workflows/compile.yml'
      - 'latexmkrc'
      - 'Makefile'
  pull_request:
    paths:
      - 'interros/**'
      - 'framework/**'
      - '.github/workflows/compile.yml'
      - 'latexmkrc'
      - 'Makefile'
  workflow_dispatch:

jobs:
  compile:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: I01 Analyse fonctionnelle
            directory: interros/I01_AnalyseFonctionnelle
            file: I01_AnalyseFonctionnelle.tex
          - name: I02 Liaisons
            directory: interros/I02_Liaisons
            file: I02_Liaisons.tex
          - name: I03 Modélisation cinématique
            directory: interros/I03_ModelisationCinematique
            file: I03_ModelisationCinematique.tex
          - name: I04 Liaisons équivalentes
            directory: interros/I04_LiaisonsEquivalentes
            file: I04_LiaisonsEquivalentes.tex

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer TeX Live
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            latexmk \
            fonts-lmodern \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-pictures \
            texlive-science \
            texlive-fonts-recommended \
            texlive-lang-french
          kpsewhich lmodern.sty

      - name: Restaurer les packages du framework
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode framework/vendor/rpcinematik.sty.gz.b64 | gzip --decompress > framework/rpcinematik.sty
          base64 --decode framework/vendor/rp-sysml.sty.gz.b64 | gzip --decompress > framework/rp-sysml.sty
          test -s framework/rpcinematik.sty
          test -s framework/rp-sysml.sty
          ls -l framework/rpcinematik.sty framework/rp-sysml.sty

      - name: Vérifier les fichiers attendus
        shell: bash
        run: |
          set -euo pipefail
          test -d '${{ matrix.directory }}'
          test -f '${{ matrix.directory }}/${{ matrix.file }}'
          test -f framework/interros-framework.tex
          test -f framework/kholles-framework.tex
          test -f framework/si-bibliotheques.tex

      - name: Compiler ${{ matrix.name }}
        shell: bash
        run: |
          set -o pipefail
          cd '${{ matrix.directory }}'
          latexmk -C '${{ matrix.file }}' || true
          latexmk -pdf -interaction=nonstopmode -halt-on-error -file-line-error '${{ matrix.file }}' 2>&1 | tee compilation-ci.log

      - name: Afficher les erreurs LaTeX
        if: failure()
        shell: bash
        run: |
          echo '===== Premières erreurs détectées ====='
          grep -nE '^!|LaTeX Error|Package .* Error|Undefined control sequence|Emergency stop|Fatal error|not found' '${{ matrix.directory }}/compilation-ci.log' | head -80 || true
          echo '===== Fin du journal ====='
          tail -120 '${{ matrix.directory }}/compilation-ci.log' || true

      - name: Déposer le PDF et les journaux
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}-resultat
          path: |
            ${{ matrix.directory }}/*.pdf
            ${{ matrix.directory }}/*.log
          if-no-files-found: warn
          retention-days: 90
